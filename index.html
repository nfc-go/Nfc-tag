<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Digital Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --gold: #c5a059; 
            --deep-black: #050505;
            --card-bg: #0a0a0a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: var(--deep-black);
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff;
            padding: 20px;
        }

        /* زر التعديل في مكانه الطبيعي (أعلى اليمين) وبشكل فخم */
        .edit-btn {
            position: absolute; top: 20px; right: 20px; 
            background: rgba(255,255,255,0.03); 
            color: #666; 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.3s;
            z-index: 100;
        }
        .edit-btn:hover { border-color: var(--gold); color: var(--gold); background: #000; }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            width: 100%; max-width: 360px; padding: 60px 25px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .profile-img-wrapper {
            width: 130px; height: 130px; margin: 0 auto 30px; border-radius: 50%;
            padding: 3px; background: linear-gradient(135deg, var(--gold), #222);
        }

        .profile-img-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--card-bg); }

        h1 { font-size: 24px; letter-spacing: 2px; margin-bottom: 8px; font-weight: 600; color: #eee; }
        .email-text { color: #666; font-size: 13px; margin-bottom: 30px; }

        .info-item { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.03); }
        .info-item a { color: var(--gold); text-decoration: none; font-size: 16px; letter-spacing: 2px; }

        .social-grid { display: flex; justify-content: center; gap: 20px; }
        .social-grid a {
            width: 50px; height: 50px; border-radius: 15px; background: #0f0f0f;
            display: none; align-items: center; justify-content: center; color: #888;
            font-size: 20px; border: 1px solid rgba(255,255,255,0.03); transition: 0.4s;
        }
        .social-grid a:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-5px); }

        /* لوحة التحكم */
        #admin-panel {
            display: none; position: fixed; inset: 0; background: #000;
            z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .form-container { max-width: 400px; margin: 40px auto; padding: 20px; }
        label { display: block; margin-top: 20px; font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #1a1a1a; background: #0a0a0a; color: #fff; font-size: 14px; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .wa-container { display: flex; align-items: center; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding-left: 15px; }
        .wa-label { color: #444; font-size: 13px; }
        .wa-container input { border: none; }

        .btn-save { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-save:hover { background: #fff; }
    </style>
</head>
<body>

    <button class="edit-btn" onclick="checkPassAndOpen()">
        <i class="fas fa-pen-nib"></i> EDIT CARD
    </button>

    <div class="card">
        <div class="profile-img-wrapper">
            <img id="view-img" src="https://via.placeholder.com/150" alt="Profile">
        </div>
        <h1 id="view-name">...</h1>
        <p class="email-text" id="view-email"></p>

        <div class="info-item" id="phone-container" style="display:none;">
            <a href="#" id="view-phone"></a>
        </div>

        <div class="social-grid">
            <a href="#" id="view-fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="#" id="view-ig" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" id="view-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <div id="admin-panel">
        <div class="form-container">
            <h2 style="color: var(--gold); letter-spacing: 3px;">CARD EDITOR</h2>
            
            <label>Profile Picture</label>
            <input type="file" id="up-file" accept="image/*">
            
            <label>Name</label>
            <input type="text" id="up-name">
            
            <label>Email</label>
            <input type="email" id="up-email">
            
            <label>Phone</label>
            <input type="tel" id="up-phone">
            
            <label>Facebook URL</label>
            <input type="text" id="up-fb">
            
            <label>Instagram URL</label>
            <input type="text" id="up-ig">
            
            <label>WhatsApp Number</label>
            <div class="wa-container">
                <span class="wa-label">wa.me/</span>
                <input type="text" id="up-wa-num">
            </div>

            <button class="btn-save" id="save-btn" onclick="handleSave()">UPDATE PROFILE</button>
            <button onclick="closeAdmin()" style="width:100%; background:none; color:#444; border:none; margin-top:20px; cursor:pointer; font-size:12px;">EXIT EDITOR</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://fbkxargeponwacnjnqls.supabase.co';
        const SB_KEY = 'sb_publishable_rBGikrPDXLiK8r0M_1-v6A_btF6X3ZI';
        const client = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) return;

            const { data } = await client.from('profiles').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('view-name').innerText = data.full_name || '';
                document.getElementById('view-email').innerText = data.email || '';
                document.getElementById('view-img').src = data.avatar_url || 'https://via.placeholder.com/150';
                
                if(data.phone) {
                    const p = document.getElementById('view-phone');
                    p.innerText = data.phone; p.href = "tel:" + data.phone;
                    document.getElementById('phone-container').style.display = 'block';
                }

                showSocial('view-fb', data.fb_link);
                showSocial('view-ig', data.ig_link);
                if(data.wa_number) {
                    showSocial('view-wa', data.wa_number);
                    document.getElementById('up-wa-num').value = data.wa_number.replace('https://wa.me/', '');
                }
                
                document.getElementById('up-name').value = data.full_name || '';
                document.getElementById('up-email').value = data.email || '';
                document.getElementById('up-phone').value = data.phone || '';
                document.getElementById('up-fb').value = data.fb_link || '';
                document.getElementById('up-ig').value = data.ig_link || '';
            }
        }

        function showSocial(id, val) {
            const el = document.getElementById(id);
            if(val && val.length > 5) { el.style.display = 'flex'; el.href = val; }
        }

        // الوظيفة الأساسية: طلب الباسورد قبل فتح لوحة التحكم
        async function checkPassAndOpen() {
            const id = new URLSearchParams(window.location.search).get('id');
            const pass = prompt("Verification Required: Enter Password");
            
            const { data } = await client.from('profiles').select('password').eq('id', id).single();
            if(data && pass === data.password) {
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("Incorrect Password.");
            }
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        async function handleSave() {
            const id = new URLSearchParams(window.location.search).get('id');
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPDATING..."; btn.disabled = true;

            const file = document.getElementById('up-file').files[0];
            let imgUrl = document.getElementById('view-img').src;

            if(file) {
                const fileName = `p-${id}-${Date.now()}`;
                const { error: upErr } = await client.storage.from('avatars').upload(fileName, file);
                if(!upErr) {
                    const { data } = client.storage.from('avatars').getPublicUrl(fileName);
                    imgUrl = data.publicUrl;
                }
            }

            const wa = document.getElementById('up-wa-num').value.replace(/\s/g, '');
            const updates = {
                full_name: document.getElementById('up-name').value,
                email: document.getElementById('up-email').value,
                phone: document.getElementById('up-phone').value,
                fb_link: document.getElementById('up-fb').value,
                ig_link: document.getElementById('up-ig').value,
                wa_number: wa ? `https://wa.me/${wa}` : "",
                avatar_url: imgUrl
            };

            const { error } = await client.from('profiles').update(updates).eq('id', id);
            if(!error) location.reload(); else alert("Error updating.");
        }

        window.onload = init;
    </script>
</body>
</html>
