<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Digital Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #000000 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff;
            padding: 20px;
        }

        /* Edit Button */
        .edit-btn {
            position: absolute; top: 20px; right: 20px; background: var(--glass);
            padding: 8px 15px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px; z-index: 100; transition: 0.3s;
        }
        .edit-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--gold); }

        /* Main Card */
        .card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            width: 100%; max-width: 380px; padding: 50px 20px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-img-wrapper {
            width: 140px; height: 140px; margin: 0 auto 25px; border-radius: 50%;
            padding: 5px; background: linear-gradient(45deg, var(--gold), #fff);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .profile-img-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #222; border: 3px solid #1a1a1a; }

        h1 { font-size: 26px; letter-spacing: 1px; margin-bottom: 5px; font-weight: 600; }
        .email-text { color: #aaa; font-size: 14px; margin-bottom: 25px; }

        /* Info & Socials */
        .info-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .info-item a { color: var(--gold); text-decoration: none; font-weight: 600; font-size: 18px; letter-spacing: 1px; }

        .social-grid { display: flex; justify-content: center; gap: 15px; }
        .social-grid a {
            width: 55px; height: 55px; border-radius: 50%; background: var(--glass);
            display: none; align-items: center; justify-content: center; color: #fff;
            font-size: 22px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .social-grid a:hover { background: var(--gold); color: #000; transform: translateY(-5px); }

        /* Admin Panel */
        #admin-panel {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97);
            z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .form-container { max-width: 450px; margin: 20px auto; background: #1a1a1a; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        label { display: block; margin-top: 15px; font-size: 12px; color: var(--gold); font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; font-size: 14px; }
        input:focus { border-color: var(--gold); outline: none; }
        
        /* Fixed WhatsApp Link UI */
        .wa-container { display: flex; align-items: center; background: #222; border: 1px solid #333; border-radius: 10px; padding-left: 12px; margin-top: 5px; }
        .wa-label { color: #666; font-size: 14px; padding-right: 5px; }
        .wa-container input { border: none; margin: 0; }

        .btn-save { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="edit-btn" onclick="openAdmin()"><i class="fas fa-user-edit"></i> EDIT PROFILE</div>

    <div class="card">
        <div class="profile-img-wrapper">
            <img id="view-img" src="https://via.placeholder.com/150" alt="Profile">
        </div>
        <h1 id="view-name">Loading Profile...</h1>
        <p class="email-text" id="view-email"></p>

        <div class="info-item" id="phone-container">
            <a href="#" id="view-phone"></a>
        </div>

        <div class="social-grid">
            <a href="#" id="view-fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="#" id="view-ig" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" id="view-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <div id="admin-panel">
        <div class="form-container">
            <h2 style="color: var(--gold); margin-bottom: 20px;">Profile Settings</h2>
            
            <label>Profile Image</label>
            <input type="file" id="up-file" accept="image/*">
            
            <label>Full Name</label>
            <input type="text" id="up-name" placeholder="Enter name">
            
            <label>Email</label>
            <input type="email" id="up-email" placeholder="Enter email">
            
            <label>Call Phone</label>
            <input type="tel" id="up-phone" placeholder="e.g. +2010...">
            
            <label>Facebook Link</label>
            <input type="text" id="up-fb" placeholder="https://facebook.com/...">
            
            <label>Instagram Link</label>
            <input type="text" id="up-ig" placeholder="https://instagram.com/...">
            
            <label>WhatsApp Number</label>
            <div class="wa-container">
                <span class="wa-label">https://wa.me/</span>
                <input type="text" id="up-wa-num" placeholder="201552314045">
            </div>

            <button class="btn-save" id="save-btn" onclick="handleSave()">SAVE CHANGES</button>
            <button onclick="closeAdmin()" style="width:100%; background:none; color:#666; border:none; margin-top:15px; cursor:pointer; text-decoration: underline;">Cancel</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://fbkxargeponwacnjnqls.supabase.co';
        const SB_KEY = 'sb_publishable_rBGikrPDXLiK8r0M_1-v6A_btF6X3ZI';
        const client = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if(!id) { document.getElementById('view-name').innerText = "Card Not Found"; return; }

            const { data, error } = await client.from('profiles').select('*').eq('id', id).single();

            if(data) {
                document.getElementById('view-name').innerText = data.full_name || 'User';
                document.getElementById('view-email').innerText = data.email || '';
                document.getElementById('view-img').src = data.avatar_url || 'https://via.placeholder.com/150';
                
                if(data.phone) {
                    document.getElementById('view-phone').innerText = data.phone;
                    document.getElementById('view-phone').href = "tel:" + data.phone;
                    document.getElementById('phone-container').style.display = 'block';
                } else {
                    document.getElementById('phone-container').style.display = 'none';
                }

                showSocial('view-fb', data.fb_link);
                showSocial('view-ig', data.ig_link);
                
                // Show WhatsApp
                if(data.wa_number) {
                    const waIcon = document.getElementById('view-wa');
                    waIcon.style.display = 'flex';
                    waIcon.href = data.wa_number; // Database stores full link
                    // Pre-fill the edit input with just the number
                    document.getElementById('up-wa-num').value = data.wa_number.replace('https://wa.me/', '');
                }
            }
        }

        function showSocial(elementId, value) {
            const el = document.getElementById(elementId);
            if(value && value.trim() !== "" && value !== "null") {
                el.style.display = 'flex';
                el.href = value;
            } else {
                el.style.display = 'none';
            }
        }

        function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        async function handleSave() {
            const id = new URLSearchParams(window.location.search).get('id');
            const pass = prompt("Verification Required: Enter Password");
            
            const btn = document.getElementById('save-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            let { data: profile } = await client.from('profiles').select('password').eq('id', id).single();
            
            if(profile && pass === profile.password) {
                const file = document.getElementById('up-file').files[0];
                let imgUrl = document.getElementById('view-img').src;

                if(file) {
                    const fileName = `img-${id}-${Date.now()}`;
                    const { error: upErr } = await client.storage.from('avatars').upload(fileName, file);
                    if(!upErr) {
                        const { data } = client.storage.from('avatars').getPublicUrl(fileName);
                        imgUrl = data.publicUrl;
                    }
                }

                // Combine fixed URL + number from input
                const rawNum = document.getElementById('up-wa-num').value.replace(/\s+/g, '');
                const finalWaLink = rawNum ? `https://wa.me/${rawNum}` : "";

                const updates = {
                    full_name: document.getElementById('up-name').value || undefined,
                    email: document.getElementById('up-email').value || undefined,
                    phone: document.getElementById('up-phone').value || undefined,
                    fb_link: document.getElementById('up-fb').value || undefined,
                    ig_link: document.getElementById('up-ig').value || undefined,
                    wa_number: finalWaLink, 
                    avatar_url: imgUrl
                };

                Object.keys(updates).forEach(key => updates[key] === undefined && delete updates[key]);

                const { error } = await client.from('profiles').update(updates).eq('id', id);
                if(!error) { alert("Updated Successfully!"); location.reload(); }
                else { alert("Error: " + error.message); }
            } else {
                alert("Incorrect Password!");
            }
            btn.innerText = "SAVE CHANGES";
            btn.disabled = false;
        }

        window.onload = init;
    </script>
</body>
</html>
